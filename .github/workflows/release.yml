name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Select the version bump to publish
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - prepatch
          - preminor
          - premajor
          - prerelease
  pull_request:
    types:
      - closed
    branches:
      - master

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  open-release-pr:
    if: github.event_name == 'workflow_dispatch' && github.ref_name == 'master'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 'lts'
          cache: true

      - name: Setup Node.js for npm
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: vp install

      - name: Run checks
        run: vp check

      - name: Run tests
        run: vp test

      - name: Configure Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version with bumpp
        run: |
          vp exec bumpp \
            --release "${{ inputs.release_type }}" \
            --all \
            --yes \
            --no-push \
            --no-tag \
            --execute "vp install" \
            --commit "Bump version to v%s"

      - name: Read version
        id: version
        shell: bash
        run: |
          version=$(node -e "console.log(JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version)")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Ensure release automation token is configured
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        shell: bash
        run: |
          if [ -z "$RELEASE_PAT" ]; then
            echo "Missing RELEASE_PAT secret. Add a fine-grained token with Contents and Pull requests write access."
            exit 1
          fi

      - name: Push release branch
        id: push_branch
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        shell: bash
        run: |
          branch="release/v${{ steps.version.outputs.version }}"
          git remote set-url origin "https://x-access-token:${RELEASE_PAT}@github.com/${{ github.repository }}.git"
          git switch -c "$branch"
          git push --set-upstream origin "$branch"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Create release pull request
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          gh pr create \
            --base master \
            --head "${{ steps.push_branch.outputs.branch }}" \
            --title "Release v${{ steps.version.outputs.version }}" \
            --body "Automated release PR created by GitHub Actions."

  publish:
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'master' &&
      startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout merged master
        uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 'lts'
          cache: true

      - name: Setup Node.js for npm
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: vp install

      - name: Run checks
        run: vp check

      - name: Run tests
        run: vp test

      - name: Read version
        id: version
        shell: bash
        run: |
          version=$(node -e "console.log(JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version)")
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Configure Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        shell: bash
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag already exists: ${{ steps.version.outputs.tag }}"
            exit 0
          fi

          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Ensure npm token is configured
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "Missing NPM_TOKEN secret. Add an npm automation token in GitHub Actions secrets."
            exit 1
          fi

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: vp pm publish --no-git-checks --access public --provenance

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ steps.version.outputs.tag }}" --generate-notes
