name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Select the version bump to publish
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - prepatch
          - preminor
          - premajor
          - prerelease

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.ref_name == 'master'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@v1
        with:
          node-version: 'lts'
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Run checks
        run: vp check

      - name: Run tests
        run: vp test

      - name: Configure Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version with bumpp
        run: |
          vp exec bumpp \
            --release "${{ inputs.release_type }}" \
            --all \
            --yes \
            --execute "vp install" \
            --commit "Bump version to v%s" \
            --tag "v%s" \
            --push

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: vp pm publish --no-git-checks --access public --provenance

      - name: Read version
        id: version
        shell: bash
        run: echo "tag=v$(node -p \"require('./package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ steps.version.outputs.tag }}" --generate-notes
